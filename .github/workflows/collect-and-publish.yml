name: Collect downloads and publish

on:
  push:
    branches: [main]
  schedule:
    # 03:17 in Israel during daylight-saving time; the exact minute is
    # intentionally uncommon to avoid the busiest part of the hour.
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: otzaria-download-tracker-pages
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect a daily snapshot
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/collect_downloads.py

      - name: Commit new data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md site/data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: collect daily download snapshot"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

